web:
  tavily:
    api_key: "${TAVILY_API_KEY}"
    base_url: "https://api.tavily.com"
    search_depth: "advanced"   # advanced|basic|fast|ultra-fast
    max_results: 5
    include_raw_content: false

student_apis:
  base_url: "https://school.example.com/api"
  api_key: "${STUDENT_API_KEY}"
  endpoints:
    profile: "/students/{student_id}"
    grades: "/students/{student_id}/grades"
    attendance: "/students/{student_id}/attendance"

rag:
  base_url: "https://rag.example.com/api"
  api_key: "${RAG_API_KEY}"
  defaults:
    use_dense: true
    use_bm25: true
    alpha: 0.5          # hybrid weight: dense vs bm25
    top_k: 20
    rerank:
      enabled: true
      model: "bge-reranker-v2"
      top_k: 10

audio:
  enabled: false
  stt:
    # if enabled: you can point to OpenAI/Whisper-like or internal ASR endpoint
    base_url: "https://speech.example.com"
    api_key: "${STT_API_KEY}"
  tts:
    base_url: "https://speech.example.com"
    api_key: "${TTS_API_KEY}"
