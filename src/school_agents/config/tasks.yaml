route_task:
  description: "Decide which routes to run for this user query.\n{conversation_context}\n\nUser query: {user_query}\n\nOutput\
    \ STRICT JSON with:\n- routes: list from [\"web\", \"student\", \"policy_rag\"], OR empty []\n- student_id: string or\
    \ null\n- from_date: YYYY-MM-DD or null\n- to_date: YYYY-MM-DD or null\n- policy_domain: one of [\"y_khoa\",\"y_te\",\"\
    duoc\",\"other\"]\n\nROUTING RULES (CHECK IN ORDER):\n\nSTEP 1 — Is this a CONVERSATION/MEMORY query? → routes=[]\n  These\
    \ queries are about THIS chat session and need NO external data:\n  - \"Summarize what we discussed\" / \"Tóm tắt cuộc\
    \ trò chuyện\"\n  - \"What did we talk about?\" / \"Nhắc lại\" / \"Recap\"\n  - \"What do you remember?\" / \"Bạn nhớ\
    \ gì?\"\n  - \"Repeat your last answer\" / \"Nói lại\"\n  - Greetings: \"hello\", \"hi\", \"thanks\", \"bye\"\n  - Simple\
    \ meta-questions about the conversation itself\n  KEY TEST: Does the user want information FROM OUR CONVERSATION HISTORY\n\
    \  rather than from the outside world? If YES → routes=[]\n\nSTEP 2 — Does it need EXTERNAL/FRESH data? → routes=[\"web\"\
    ]\n  - News, events, wars, politics, economy, technology, science\n  - Time-sensitive: \"72h\", \"latest\", \"mới nhất\"\
    , \"hôm nay\"\n  - Factual questions about the real world\n  - Predictions, analysis of current events\n\nSTEP 3 — Does\
    \ it need INTERNAL data?\n  - Student by ID → routes=[\"student\"]\n  - School policy/regulations → routes=[\"policy_rag\"\
    ]\n  - Can combine: [\"web\",\"student\"], [\"web\",\"policy_rag\"]\n\nEXAMPLES:\n  \"Summarize what we have been discussing\
    \ so far\" → {\"routes\": []}\n  \"Tóm tắt lại cho tôi\" → {\"routes\": []}\n  \"US Iran war latest?\" → {\"routes\":\
    \ [\"web\"]}\n  \"Tình hình chiến tranh Mỹ Iran?\" → {\"routes\": [\"web\"]}\n  \"Điểm của SV001?\" → {\"routes\": [\"\
    student\"], \"student_id\": \"SV001\"}\n\n"
  expected_output: '{"routes":["web"],"student_id":null,"from_date":null,"to_date":null,"policy_domain":"other"}

    '
  agent: router
web_task:
  description: "{conversation_context}\n\n=== YOUR TASK ===\nResearch this question using web search:\n{user_query}\n\n===\
    \ WORKFLOW ===\nSTEP 1: Check if [Pre-searched results] are provided in the question above.\n        These come from query\
    \ expansion and may already contain useful data.\n\nSTEP 2: Evaluate the pre-searched results:\n        - Are they RECENT\
    \ enough for this topic? (For fast-moving news: must be <3 days old)\n        - Do they FULLY answer the question with\
    \ sufficient depth?\n        - If YES to both → go to STEP 4\n        - If NO to either → go to STEP 3\n\nSTEP 3: Call\
    \ ONE search tool to get fresh/additional information:\n        - For specific questions → web_search_deep(query=\"precise\
    \ search terms\")\n        - For broad topics → web_search_expanded(query=\"broad topic\")\n        Choose search terms\
    \ carefully: be specific, include dates if relevant.\n\nSTEP 4: Combine ALL evidence (pre-searched + your search results\
    \ if any).\n        Write your Final Answer as JSON:\n\n        Final Answer: {\"findings\": [\"point 1\", \"point 2\"\
    , ...], \"sources\": [{\"url\": \"...\", \"title\": \"...\"}]}\n\n=== RULES ===\n- NEVER call the same tool twice with\
    \ the same query.\n- After receiving tool results, IMMEDIATELY write your Final Answer.\n- Include ALL URLs from both\
    \ pre-searched and your own search.\n- Findings should be factual statements, not opinions.\n- You MUST prefix with \"\
    Final Answer:\" or your response will be rejected.\n"
  expected_output: 'Final Answer: JSON with findings and sources.'
  agent: web_researcher
student_task:
  description: 'Fetch student info using internal APIs.


    Inputs:

    - student_id: {student_id}

    - from_date: {from_date}

    - to_date: {to_date}


    Required calls:

    1) student_get_profile(student_id)

    2) student_get_grades(student_id, from_date, to_date)

    3) student_get_attendance(student_id, from_date, to_date)


    Write your response starting with "Final Answer:" followed by STRICT JSON:

    Final Answer: {"profile":{...},"grades":[...],"attendance":[...]}


    You MUST prefix your response with "Final Answer:" or it will be rejected.

    '
  expected_output: 'Final Answer: JSON with profile, grades, attendance.'
  agent: student_data
policy_task:
  description: "Use internal RAG to answer policy/syllabus/regulation questions for Medical/Healthcare/Pharmacy.\n\nQuery:\
    \ {user_query}\nDomain hint: {policy_domain}\n\nIf domain is one of y_khoa/y_te/duoc OR query is clearly about school\
    \ policy:\n  - call rag_query_policy(query=user_query, domain=policy_domain)\nOtherwise:\n  - Final Answer: {\"skipped\"\
    :true,\"reason\":\"domain not medical policy\"}\n\nWrite your response starting with \"Final Answer:\" followed by JSON\
    \ with answer + citations.\nYou MUST prefix your response with \"Final Answer:\" or it will be rejected.\n"
  expected_output: 'Final Answer: JSON with answer + citations from RAG, or skipped.'
  agent: policy_rag
compose_task:
  description: "{conversation_context}\n\n=== YOUR TASK ===\nCompose the final answer for this user question:\n{user_query}\n\
    \n=== EVIDENCE AVAILABLE ===\nYou may receive evidence from these specialist agents:\n- web_result: JSON with findings\
    \ and sources from web search\n- student_result: JSON with student profile, grades, attendance\n- policy_result: JSON\
    \ with policy documents and citations from RAG\n\nIf NO specialist evidence is provided, the user is asking about the\
    \ CONVERSATION\nITSELF (e.g., \"summarize what we discussed\", \"recap\", \"tóm tắt\"). In that case,\nanswer ENTIRELY\
    \ from the conversation context above. This is valid and expected.\n\n=== OUTPUT RULES ===\n1. Start your response with\
    \ \"Final Answer:\" — this is MANDATORY.\n2. Write in Vietnamese (unless user writes in English).\n3. Use ALL relevant\
    \ evidence. Do not skip any important findings.\n4. For date-relative questions: the current date/time is at the top of\
    \ the context.\n   Calculate actual dates. Example: \"72 giờ tới\" from March 1 = March 1-4.\n5. If evidence is insufficient\
    \ for part of the question, say so honestly.\n6. If web results were used, end with a numbered \"Nguồn:\" list of URLs.\n\
    7. Do NOT output raw JSON to the user. Write natural, readable prose.\n8. Be thorough but concise. No filler sentences.\n\
    9. Base your answer on the evidence AND conversation context provided.\n10. Do NOT make up information that isn't in the\
    \ evidence or conversation context.\n\n=== FORMAT EXAMPLE ===\nFinal Answer: Theo các nguồn tin mới nhất, tình hình...\n\
    \n**Điểm chính:**\n1. ...\n2. ...\n\nNguồn:\n[1] https://example.com/article1\n[2] https://example.com/article2\n"
  expected_output: 'Final Answer: Complete answer in Vietnamese based on provided evidence + sources.'
  agent: composer
