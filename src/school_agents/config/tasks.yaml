route_task:
  description: "Decide which routes to run for this user query.\n{conversation_context}\n\nUser query: {user_query}\n\nOutput\
    \ STRICT JSON with:\n- routes: list from [\"web\", \"student\", \"policy_rag\"], OR empty []\n- student_id: string or\
    \ null\n- from_date: YYYY-MM-DD or null\n- to_date: YYYY-MM-DD or null\n- policy_domain: one of [\"y_khoa\",\"y_te\",\"\
    duoc\",\"other\"]\n\nROUTING RULES (CHECK IN ORDER):\n\nSTEP 0 — ALWAYS set defaults in the JSON (even if unused):\n \
    \ routes=[]; student_id=null; from_date=null; to_date=null; policy_domain=\"other\"\n\nSTEP 1 — CONVERSATION / NO-SEARCH?\
    \ → routes=[]\n  COMMENTARY: Default should be NO-TOOL. Perplexity-style only searches when freshness/verification is\
    \ needed.\n  Choose routes=[] if the question can be answered well without external/fresh data:\n  - Summarize/recap/review\
    \ THIS chat session: \"summarize\", \"recap\", \"tóm tắt\", \"nhắc lại\", \"what did we discuss\"\n  - Greetings/chit-chat:\
    \ \"hello\", \"hi\", \"thanks\", \"bye\", \"bạn khỏe không\"\n  - Writing/translation/rewrite\n  - Coding/debugging/math/algorithms\n\
    \  - Explanations of stable concepts (history, theory, definitions)\n  KEY TEST A (Freshness): Would the answer likely\
    \ change with today's date, latest news, live stats, prices, schedules?\n  KEY TEST B (Verification): Did the user explicitly\
    \ ask for sources/links/citations/\"verify\"?\n  If A=NO and B=NO → routes=[]\n\nSTEP 2 — WEB SEARCH NEEDED? → routes=[\"\
    web\"]\n  COMMENTARY: Only search when freshness or verification matters.\n  Trigger web if ANY of the following is true:\n\
    \  - Time-sensitive / live: \"hôm nay\", \"hiện tại\", \"bây giờ\", \"mới nhất\", \"latest\", \"this week\", \"72h tới\"\
    \n  - News/events/politics/economy/markets/security/incidents\n  - Prices/rates/availability/opening hours/schedules/rankings\
    \ \"best/top\" / \"near me\"\n  - \"ai đang là...\", \"current CEO/president\", \"phiên bản mới nhất\", \"release date\"\
    , \"what changed\" (post-cutoff changes)\n  - Explicit sources/verification: \"nguồn\", \"link\", \"citation\", \"theo\
    \ báo\", \"verify/kiểm chứng\"\n  NOTE: Stable/common knowledge without verification request → do NOT web.\n\nSTEP 3 —\
    \ INTERNAL DATA NEEDED?\n  - ONLY add \"student\" if the query EXPLICITLY mentions a Student ID (e.g., SV001) or asks\
    \ for school grades/attendance.\n  - ONLY add \"policy_rag\" if the query EXPLICITLY asks about the university's internal\
    \ policies, regulations, or syllabus.\n  - \U0001F6A8 ANTI-HALLUCINATION RULE: DO NOT trigger \"student\" or \"policy_rag\"\
    \ just because you see medical words like \"Pharmacy\" (Dược), \"Hospital\" (Bệnh viện), or \"Clinic\" in a real-world\
    \ business/news context (e.g., \"Long Chau Pharmacy\", \"Pharmacity\"). Those are pure \"web\" queries!\n  - You can combine:\
    \ [\"web\",\"student\"], [\"web\",\"policy_rag\"], etc.\n"
  expected_output: STRICT JSON containing the routing decision.
  agent: router
web_task:
  description: "{conversation_context}\n\n=== YOUR TASK ===\nResearch this question using web search:\n{user_query}\n\n===\
    \ PERPLEXITY-STYLE GOAL ===\nReturn: (1) claim-level findings with inline source IDs, (2) clean source list.\n\n=== WORKFLOW\
    \ ===\nSTEP 1: Check if [Pre-searched results] are provided in the question above.\n        These come from query expansion\
    \ and may already contain useful data.\n\nSTEP 2: Evaluate the pre-searched results:\n        - Are they RECENT enough\
    \ for this topic?\n          * Fast-moving (news/politics/markets/security): prefer <3 days old.\n          * Medium-moving\
    \ (product releases, policy changes): prefer <30 days.\n        - Do they FULLY answer the question with sufficient depth\
    \ and multiple independent sources?\n        - If YES to both → go to STEP 4\n        - If NO to either → go to STEP 3\n\
    \nSTEP 3: Call ONE search tool to get fresh/additional information:\n        - For specific factual queries → use the\
    \ web_search_deep tool\n        - For broad/multi-faceted topics → use the web_search_expanded tool\n        COMMENTARY:\
    \ Use web_search_expanded when you need multiple angles (timeline + key actors + latest update) in one call.\n       \
    \ Query crafting rules:\n        - Include exact entities + location + timeframe (e.g., \"March 2026\") when relevant\n\
    \        - Add synonyms/aliases if common\n        - Prefer authoritative sources (gov, major outlets, official orgs)\n\
    \nSTEP 4: Synthesize ALL evidence (pre-searched + your search results if any).\n        Provide your Final Answer as JSON\
    \ with this structure:\n\n        Final Answer: {\n          \"findings\": [\n            \"Claim 1 ... [S1][S3]\",\n\
    \            \"Claim 2 ... [S2]\"\n          ],\n          \"sources\": [\n            {\"id\": \"S1\", \"url\": \"...\"\
    , \"title\": \"...\"},\n            {\"id\": \"S2\", \"url\": \"...\", \"title\": \"...\"}\n          ],\n          \"\
    as_of\": \"YYYY-MM-DD\",\n          \"notes\": [\"Any important uncertainty / disagreement across sources\"]\n       \
    \ }\n\n=== RULES ===\n- NEVER call the same tool twice with the same query.\n- Findings MUST be factual claims supported\
    \ by sources, not opinions.\n- Each finding MUST include at least one source ID like [S1].\n- Include ALL URLs from both\
    \ pre-searched and your own search.\n- If sources disagree, reflect the disagreement in findings + notes (do not hide\
    \ it).\n- If [Pre-searched results] already fully cover the question, go STRAIGHT to Final Answer without calling any\
    \ tool.\n- You MUST prefix your JSON with \"Final Answer:\" — this is a SYSTEM REQUIREMENT for the pipeline to accept\
    \ your output.\n"
  expected_output: 'Final Answer: STRICT JSON with findings, sources, as_of, and notes.'
  agent: web_researcher
student_task:
  description: 'Fetch student info using internal APIs.


    Inputs:

    - student_id: {student_id}

    - from_date: {from_date}

    - to_date: {to_date}


    Required calls (use each tool ONCE):

    1) student_get_profile with the student_id

    2) student_get_grades with the student_id and date range

    3) student_get_attendance with the student_id and date range


    Provide your Final Answer as JSON:

    Final Answer: {"profile":{...},"grades":[...],"attendance":[...]}

    '
  expected_output: 'Final Answer: STRICT JSON with profile, grades, attendance.'
  agent: student_data
policy_task:
  description: "Use internal RAG to answer policy/syllabus/regulation questions for Medical/Healthcare/Pharmacy.\n\nQuery:\
    \ {user_query}\nDomain hint: {policy_domain}\n\nIf domain is one of y_khoa/y_te/duoc OR query is clearly about school\
    \ policy:\n  - use the rag_query_policy tool with the user query and domain\nOtherwise:\n  - provide Final Answer: {\"\
    skipped\":true,\"reason\":\"domain not medical policy\"}\n\nProvide your Final Answer as JSON with answer + citations.\n\
    Final Answer: {\"answer\":\"...\",\"citations\":[...]}\n"
  expected_output: 'Final Answer: STRICT JSON with answer + citations from RAG, or skipped.'
  agent: policy_rag
compose_task:
  description: "{conversation_context}\n\n=== YOUR TASK ===\nCompose the final answer for this user question:\n{user_query}\n\
    \n=== EVIDENCE AVAILABLE ===\nYou may receive evidence from these specialist agents:\n- web_result: JSON with findings\
    \ and sources from web search\n- student_result: JSON with student profile, grades, attendance\n- policy_result: JSON\
    \ with policy documents and citations from RAG\n\nCOMMENTARY (CRITICAL FIX): NO evidence ≠ conversation recap.\nIf NO\
    \ specialist evidence is provided:\n- If the user explicitly asks to summarize/recap/review THIS chat session → answer\
    \ ENTIRELY from conversation context.\n- Otherwise → answer the user query normally using your own knowledge + conversation\
    \ context (NO tools).\n- If user explicitly requests sources/links/verification but web_result is missing → say you cannot\
    \ provide verified sources without running the web route.\n\n=== OUTPUT RULES ===\n1. Start your response with \"Final\
    \ Answer:\" — MANDATORY. This ends the CrewAI loop.\n2. Write in Vietnamese (unless user writes in English).\n3. Perplexity-style\
    \ structure:\n   - Direct answer first (2–4 sentences)\n   - Then \"Điểm chính\" as bullet/numbered list\n   - If web_result\
    \ exists, add inline citations like [S1] next to the claims\n   - End with \"Nguồn\" mapping source IDs to URLs/titles\n\
    4. Use ALL relevant evidence. Do not skip important findings.\n5. Date-relative questions: use current date/time from\
    \ context. Example: \"72 giờ tới\" from March 1 = March 1–4.\n6. If evidence is insufficient for part of the question,\
    \ say so honestly.\n7. Do NOT output raw JSON to the user. Write natural, readable prose.\n8. Do NOT make up information\
    \ not supported by evidence or conversation context.\n\n=== FORMAT EXAMPLE ===\nFinal Answer: ...\n\n**Điểm chính:**\n\
    1. ... [S1]\n2. ... [S2]\n\nNguồn:\n[S1] <title> — <url>\n[S2] <title> — <url>\n"
  expected_output: 'Final Answer: Complete answer in Vietnamese based on provided evidence + sources.'
  agent: composer
